<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>校园资讯聚合系统</title>


<style>

/* 全局 */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


body {

    font-family: "微软雅黑", Arial, sans-serif;

    color: #333;

    min-height: 100vh;

    background: linear-gradient(
        135deg,
        #d8f3dc,
        #ffffff
    );

}


/* 顶部 */

.header {

    padding: 40px;

    text-align: center;

}


.header h1 {

    font-size: 36px;

    color: #2d6a4f;

}


.header p {

    margin-top: 10px;

    color: #666;

}


/* 搜索区域 */


.search-box {

    width:60%;

    margin:20px auto 10px;

    display:flex;

}



.search-form {

    width:100%;

    display:flex;

}



.search-box input {


    flex:1;

    padding:16px;

    border:none;

    border-radius:20px 0 0 20px;

    box-shadow:0 3px 10px rgba(0,0,0,0.1);

}



.search-box button {


    width:90px;

    border:none;

    background:#40916c;

    color:white;

    border-radius:0 20px 20px 0;

    cursor:pointer;

    user-select: none;  

}


/* 内容 */

.container {

    width: 70%;

    margin:auto;

}


.section-title {

    font-size:26px;

    margin-bottom:20px;

}


/* 新闻卡片 */

.news-card {


    background:white;

    padding:25px;

    margin-bottom:20px;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,0.1);

 
}



.news-source {


    color:#40916c;

    font-size:14px;

}


.news-title {


    font-size:22px;

    margin:10px 0;

}



.news-time {


    color:#888;

    font-size:14px;

}



.news-abstract {


    margin-top:15px;

    line-height:1.7;

}



.detail-btn {

    display:inline-block;

    margin-top:15px;

    padding:8px 18px;

    background:#40916c;

    color:white;

    text-decoration:none;

    border-radius:20px;

    cursor:pointer;

    user-select: none;  

}

.button {
            
    display:block;

    width:fit-content;

    margin:40px auto 40px;

    background:#40916c;

    color:white;

    padding:10px 25px;

    border-radius:20px;

    text-decoration:none;

    cursor:pointer;

    user-select: none;  

}

</style>

</head>



<body>


<div class="header">


<h1>
校园资讯聚合系统
</h1>


<p>
Campus News Hub · 一站式校园信息平台
</p>



<div class="search-box">

<input
id="search-input"
placeholder="在所有新闻中进行搜索">


<button
id="search-button"
type="button">
搜索
</button>

</div>

</div>





<div class="container">


<div class="section-title">

最新资讯

</div>

    <!-- C++生成新闻列表 -->
     <div class="news-list">

        <div class="news-card"><div class="news-source">城市日报</div><div class="news-title">未来科技展望</div><div class="news-time">发布时间：2026-07-10 21:00</div><div class="news-abstract">测试新闻摘要 69</div><a class="detail-btn" href="detail/74.html">查看详情</a></div><div class="news-card"><div class="news-source">城市日报</div><div class="news-title">未来科技展望</div><div class="news-time">发布时间：2026-07-10 19:00</div><div class="news-abstract">测试新闻摘要 19</div><a class="detail-btn" href="detail/24.html">查看详情</a></div><div class="news-card"><div class="news-source">城市日报</div><div class="news-title">未来科技展望</div><div class="news-time">发布时间：2026-07-10 17:00</div><div class="news-abstract">测试新闻摘要 89</div><a class="detail-btn" href="detail/94.html">查看详情</a></div>

     </div>

    <!-- 更多新闻 -->

    <div class="more">


        <a class="button" href="category_index.html">

            查看更多新闻与分类

        </a>


    </div>

</div>

<script>

let input = document.getElementById("search-input");
let button = document.getElementById("search-button");

button.addEventListener("click", function(){

    let keyword = input.value;

    if(keyword.trim() === ""){
        alert("请输入搜索关键词");
        return;
    }

    window.location.href =
    "search.html?keyword=" 
    + encodeURIComponent(keyword);

});

</script>

</body>

</html>
