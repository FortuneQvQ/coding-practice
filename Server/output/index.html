<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>校园资讯聚合系统</title>


<style>

/* 全局 */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


body {

    font-family: "微软雅黑", Arial, sans-serif;

    color: #333;

    min-height: 100vh;

    background: linear-gradient(
        135deg,
        #d8f3dc,
        #ffffff
    );

}


/* 顶部 */

.header {

    padding: 40px;

    text-align: center;

}


.header h1 {

    font-size: 36px;

    color: #2d6a4f;

}


.header p {

    margin-top: 10px;

    color: #666;

}


/* 搜索区域 */

.search-box {

    width: 60%;

    margin: 20px auto 10px;

}

.search-form {

    width:100%;

    display: flex;

}

.search-box input {

    flex: 1;

    padding: 16px;

    border-radius: 20px 0 0 20px;

    border: none;

    box-shadow: 0 3px 10px rgba(0,0,0,0.1);

}


.search-box button {


    width: 90px;

    border:none;

    background:#40916c;

    color:white;

    border-radius:0 20px 20px 0;

    cursor: pointer;

    user-select: none;  
}


/* 内容 */

.container {

    width: 70%;

    margin:auto;

}


.section-title {

    font-size:24px;

    margin-bottom:20px;

}


/* 新闻卡片 */

.news-card {


    background:white;

    padding:25px;

    margin-bottom:20px;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,0.1);

 
}



.news-source {


    color:#40916c;

    font-size:14px;

}


.news-title {


    font-size:22px;

    margin:10px 0;

}



.news-time {


    color:#888;

    font-size:14px;

}



.news-abstract {


    margin-top:15px;

    line-height:1.7;

}



.detail-btn {


    display:inline-block;

    margin-top:15px;

    padding:8px 18px;

    background:#40916c;

    color:white;

    text-decoration:none;

    border-radius:20px;

}

.button {
            
    display:block;

    width:fit-content;

    margin:40px auto 40px;


    background:#40916c;

    color:white;

    padding:10px 25px;

    border-radius:20px;

    text-decoration:none;


}

</style>

</head>



<body>


<div class="header">


<h1>
校园资讯聚合系统
</h1>


<p>
Campus News Hub · 一站式校园信息平台
</p>



<div class="search-box">

<form class="search-form" action="search.html" method="get">

<input 
name="keyword"
placeholder="请输入关键词搜索资讯">


<button type="submit">
搜索
</button>


</form>

</div>

</div>





<div class="container">


<div class="section-title">

最新资讯

</div>

    <!-- C++动态生成新闻列表 -->
     <div class="newslist">

        <div class="news-card"><div class="news-source">教务处</div><div class="news-title">关于暑假安排的通知</div><div class="news-time">发布时间：2026-07-07</div><div class="news-abstract">学校发布暑假安排通知，请同学查看。</div><a class="detail-btn" href="detail/1.html">查看详情</a></div><div class="news-card"><div class="news-source">学生会</div><div class="news-title">社团招新公告</div><div class="news-time">发布时间：2026-07-05</div><div class="news-abstract">校园社团招新活动开始。</div><a class="detail-btn" href="detail/2.html">查看详情</a></div><div class="news-card"><div class="news-source">学院</div><div class="news-title">竞赛报名通知</div><div class="news-time">发布时间：2026-07-01</div><div class="news-abstract">欢迎同学报名参加比赛。</div><a class="detail-btn" href="detail/3.html">查看详情</a></div>

     </div>

    <!-- 更多新闻 -->

    <div class="more">


        <a class="button" href="category.html">

            查看更多新闻与分类

        </a>


    </div>

</div>

</body>

</html>
