<!DOCTYPE html>

<html lang="zh-CN">


<head>

<meta charset="UTF-8">

<title>新闻详情</title>


<style>


* {

    margin:0;

    padding:0;

    box-sizing:border-box;

}



body {

    font-family:"微软雅黑",Arial,sans-serif;

    background:linear-gradient(
        135deg,
        #d8f3dc,
        #ffffff
    );

    color:#333;

    min-height:100vh;

}



/* 顶部标题 */

.header {


    text-align:center;

    padding:35px;


}



.header h1 {


    color:#2d6a4f;

    font-size:32px;


}



.header p {


    color:#666;

    margin-top:10px;


}




/* 内容主体 */

.container {


    width:70%;

    margin:20px auto;


}



.news-box {


    background:white;

    padding:40px;

    border-radius:20px;


    box-shadow:

    0 5px 20px rgba(0,0,0,0.1);


}



/* 来源 */


.source {


    color:#40916c;

    font-size:15px;


}



/* 标题 */

.title {


    font-size:32px;

    margin:15px 0;


    line-height:1.5;


}



/* 时间 */


.time {


    color:#888;

    font-size:14px;

    margin-bottom:25px;


}



/* 图片 */


.news-image {

    width:100%;

    max-height:300px;

    object-fit:cover;

    border-radius:15px;

    display: block;

    margin: 0 auto 20px;

}




/* 正文 */


.content {


    font-size:17px;

    line-height:2;

    text-indent:2em;

    margin-bottom: 25px;

}



/* 原文链接 */


.origin {


    margin-top:35px;

    padding-top:20px;

    border-top:1px solid #eee;


}



.origin a {


    color:#40916c;

    text-decoration:none;


}



.back {


    display:block;

    width:fit-content;

    margin:30px auto 0;

    background:#40916c;

    color:white;

    padding:10px 25px;

    border-radius:20px;

    text-decoration:none;

    cursor:pointer;

    user-select: none;  


}

/* 底部按钮 */


.bottom-buttons {


    display:flex;


    justify-content:center;


    gap:80px;


    margin:40px auto;


}



.button {


    display:block;


    padding:10px 30px;


    background:#40916c;


    color:white;


    border-radius:20px;


    text-decoration:none;


}



</style>


</head>
