<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>新闻分类</title>


<style>


*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}



body{

    font-family:"微软雅黑",Arial,sans-serif;

    background:linear-gradient(
        135deg,
        #d8f3dc,
        #ffffff
    );

    color:#333;

    min-height:100vh;

}



/* 顶部 */

.header{

    text-align:center;

    padding:40px;

}



.header h1{

    font-size:36px;

    color:#2d6a4f;

}



.header p{

    margin-top:10px;

    color:#666;

}





/* 内容区域 */

.container{

    width:70%;

    margin:auto;

}





.section-title{


    font-size:26px;

    margin-bottom:25px;


}





/* 分类卡片 */

.category-card{


    background:white;

    padding:30px;

    margin-bottom:25px;

    border-radius:20px;


    box-shadow:

    0 5px 20px rgba(0,0,0,0.1);


    transition:0.3s;


}



.category-card:hover{


    transform:translateY(-5px);


}




.category-title{


    font-size:24px;

    color:#2d6a4f;

    margin-bottom:10px;


}



.category-desc{


    color:#666;

    line-height:1.7;


}



.category-btn{


    display:inline-block;

    margin-top:20px;


    padding:10px 25px;


    background:#40916c;


    color:white;


    border-radius:20px;


    text-decoration:none;


}




/* 返回按钮 */

.back{


    display:block;

    width:fit-content;

    margin:35px auto;


    padding:10px 25px;


    background:#40916c;

    color:white;


    border-radius:20px;


    text-decoration:none;


}



</style>


</head>



<body>



<div class="header">


<h1>
新闻分类浏览
</h1>


<p>
Campus News Hub · Browse Categories
</p>


</div>




<div class="container">


<div class="section-title">

选择浏览方式

</div>



<!-- 时间分类 -->


<div class="category-card">


<div class="category-title">

📅 按时间分类

</div>



<div class="category-desc">

按照新闻发布时间浏览资讯，
快速查看近期或历史校园新闻。

</div>


<a class="category-btn"
href="time_category.html">

查看时间分类

</a>


</div>





<!-- 来源分类 -->


<div class="category-card">


<div class="category-title">

🏫 按来源分类

</div>



<div class="category-desc">

按照资讯发布部门分类，
例如教务处、学生会、学院通知等。

</div>



<a class="category-btn"
href="source_category.html">

查看来源分类

</a>


</div>






<!-- 主题分类 -->


<div class="category-card">


<div class="category-title">

📚 按主题分类

</div>



<div class="category-desc">

按照新闻主题浏览，
例如考试、活动、科研、竞赛等。

</div>



<a class="category-btn"
href="topic_category.html">

查看主题分类

</a>


</div>





<a class="back"
href="index.html">

返回首页

</a>




</div>



</body>


</html>
