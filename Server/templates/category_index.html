<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>新闻分类浏览</title>


<style>


* {

    margin:0;
    padding:0;
    box-sizing:border-box;

}



body {


    font-family:"微软雅黑",Arial,sans-serif;

    color:#333;

    min-height:100vh;


    background:linear-gradient(
        135deg,
        #d8f3dc,
        #ffffff
    );

}




/* 顶部 */


.header {


    padding:40px;

    text-align:center;


}



.header h1 {


    font-size:36px;

    color:#2d6a4f;


}



.header p {


    margin-top:10px;

    color:#666;


}





/* 主体 */


.container {


    width:70%;

    margin:auto;


}



.section-title {


    font-size:24px;

    margin:20px 0;


}




/* 分类卡片 */


.category-card {


    background:white;


    padding:30px;


    margin-bottom:25px;


    border-radius:15px;


    box-shadow:


    0 5px 15px rgba(0,0,0,0.1);


}



.category-title {


    font-size:25px;

    color:#2d6a4f;


    margin-bottom:20px;


}




/* 分类按钮 */


.tag {


    display:inline-block;


    padding:10px 20px;


    margin:8px;


    background:#d8f3dc;


    color:#2d6a4f;


    border-radius:20px;


    text-decoration:none;


    transition:0.3s;

    
    cursor:pointer;


    user-select: none;  


}



.tag:hover {


    background:#40916c;

    color:white;


}





/* 返回按钮 */


.back {


    display:block;


    width:fit-content;


    margin:40px auto;


    padding:10px 25px;


    background:#40916c;


    color:white;


    border-radius:20px;


    text-decoration:none;


    cursor:pointer;


    user-select: none;  


}



</style>


</head>



<body>



<div class="header">


<h1>

新闻分类浏览

</h1>


<p>

Campus News Hub · Browse Categories

</p>


</div>






<div class="container">


<div class="section-title">

选择分类方式

</div>





<!-- 时间分类 -->


<div class="category-card">


<div class="category-title">

</div>

href="categories/time_today.html">

</a>

href="categories/time_weekago.html">

<a class="tag"
href="categories/time_monthago.html">

</a>



<a class="tag"
href="categories/time_history.html">

</a>



</div>







<!-- 来源分类 -->

</div>

href="categories/source_jwc.html">

href="categories/source_xsh.html">

</div>








<!-- 主题分类 -->

</div>







<a class="back"
href="index.html">

返回新闻主页

</a>



</div>




</body>

</html>
