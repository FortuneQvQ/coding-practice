<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>校园资讯聚合系统</title>


<style>

/* 全局 */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


body {

    font-family: "微软雅黑", Arial, sans-serif;

    color: #333;

    min-height: 100vh;

    background: linear-gradient(
        135deg,
        #d8f3dc,
        #ffffff
    );

}


/* 顶部 */

.header {

    padding: 40px;

    text-align: center;

}


.header h1 {

    font-size: 36px;

    color: #2d6a4f;

}


.header p {

    margin-top: 10px;

    color: #666;

}


/* 搜索区域 */

.search-box {

    width: 60%;

    margin: 20px auto 10px;

    display: flex;

}


.search-box input {

    flex: 1;

    padding: 16px;

    border-radius: 20px 0 0 20px;

    border: none;

    box-shadow: 0 3px 10px rgba(0,0,0,0.1);

}


.search-box button {


    width: 90px;

    border:none;

    background:#40916c;

    color:white;

    border-radius:0 20px 20px 0;

}


/* 内容 */

.container {

    width: 70%;

    margin:auto;

}


.section-title {

    font-size:24px;

    margin-bottom:20px;

}


/* 新闻卡片 */

.news-card {


    background:white;

    padding:25px;

    margin-bottom:20px;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,0.1);

 
}



.news-source {


    color:#40916c;

    font-size:14px;

}


.news-title {


    font-size:22px;

    margin:10px 0;

}



.news-time {


    color:#888;

    font-size:14px;

}



.news-content {


    margin-top:15px;

    line-height:1.7;

}



.detail-btn {


    display:inline-block;

    margin-top:15px;

    padding:8px 18px;

    background:#40916c;

    color:white;

    text-decoration:none;

    border-radius:20px;

}

.button {
            
    display:block;

    width:fit-content;

    margin:40px auto 40px;


    background:#40916c;

    color:white;

    padding:10px 25px;

    border-radius:20px;

    text-decoration:none;


}

</style>

</head>



<body>


<div class="header">


<h1>
校园资讯聚合系统
</h1>


<p>
Campus News Hub · 一站式校园信息平台
</p>



<div class="search-box">


<input 
placeholder="请输入关键词搜索资讯">


<button>
搜索
</button>


</div>


</div>





<div class="container">


<div class="section-title">

最新资讯

</div>



<!-- 新闻1 -->

<div class="news-card">


<div class="news-source">

{{source1}}

</div>


<div class="news-title">

{{title1}}

</div>


<div class="news-time">

发布时间：{{time1}}

</div>


<a class="detail-btn"
href="news_detail.html">

查看详情

</a>


</div>





<!-- 新闻2 -->


<div class="news-card">


<div class="news-source">

{{source2}}

</div>


<div class="news-title">

{{title2}}

</div>


<div class="news-time">

发布时间：{{time2}}

</div>

<a class="detail-btn"
href="news_002.html">

查看详情

</a>


</div>


<!-- 新闻3 -->

<div class="news-card">


<div class="news-source">

{{source3}}

</div>


<div class="news-title">

{{title3}}

</div>


<div class="news-time">

发布时间：{{time3}}

</div>


<a class="detail-btn"
href="news_003.html">

查看详情

</a>


</div>

    <!-- 更多新闻 -->

    <div class="more">


        <a class="button" href="category.html">

            查看更多新闻与分类

        </a>


    </div>

</div>

</body>

</html>
